name: Deploy to Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Webhook
        run: |
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK_URL }}' \
               --header 'Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}'
